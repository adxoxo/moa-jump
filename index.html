<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MOA JUMP — Jump to the Stars</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0014;
      height: 100%;
      overflow: hidden;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #game-root {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="game-root"></div>

  <!-- Phaser 3.60 + GSAP 3.12 — vendored locally (NOT a CDN) so the game still loads on
       a flaky/offline network. A hanging CDN <script> used to block everything below it. -->
  <script src="lib/phaser.min.js?v=8"></script>
  <script src="lib/gsap.min.js?v=8"></script>

  <!-- Game source — order matters: globals & entities before scenes.
       The ?v=N query busts mobile browser caches whenever the code changes;
       bump it (here + below) on every deploy so phones never run stale JS. -->
  <script src="src/main.js?v=8"></script>
  <script src="src/entities/Player.js?v=8"></script>
  <script src="src/entities/Platform.js?v=8"></script>
  <script src="src/entities/Enemy.js?v=8"></script>
  <script src="src/zones/ZoneManager.js?v=8"></script>
  <script src="src/services/leaderboard.js?v=8"></script>
  <script src="src/scenes/TitleScene.js?v=8"></script>
  <script src="src/scenes/CharacterSelectScene.js?v=8"></script>
  <script src="src/scenes/GameScene.js?v=8"></script>
  <script src="src/scenes/WinScene.js?v=8"></script>
  <script src="src/scenes/LeaderboardScene.js?v=8"></script>

  <!-- Boot Phaser after all scripts loaded -->
  <script src="src/boot.js?v=8"></script>
</body>
</html>
